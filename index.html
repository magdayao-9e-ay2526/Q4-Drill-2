<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Drill 2</title>

    <!-- CSS -->
     <link rel="stylesheet" href="styles.css">

    <!-- BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</head>
<body>
    <div class="container">
        <h1>Heat Index</h1>
        <div class="container2">
                 <div class="row">
            <div class="col-12 col-md-6 col-lg-6">
                <h1>Heat Index Checker</h1>
                <details ontoggle="Note()">
                    <summary>Note</summary>
                    <p>Input the temperature (ºC) and humidity (%), then click Check to see the Heat index and its status</p>

                    </details>

                <form>
                <p>Temperature in ºC</p>
                    <input type="number" class="form-control" id="temperature" placeholder="input degree value">
                <p>Humidity in %</p>
                    <input type="number" class="form-control" id="humidity" placeholder="input percentage value">
                </form><br>
                <button type="submit" class="btn btn-warning" onclick="checkHeat()">Check</button>
                <button type="button" class="btn btn-success" onclick="window.location.reload()">Refresh</button>
               </div>
                <div class="col-12 col-md-6 col-lg-6">

                <img src="https://media.istockphoto.com/id/1451540253/vector/fire-check-vector-logo-design-template.jpg?s=612x612&w=0&k=20&c=-dyIiMNUFMdPs0L0nIWjjABNuJ4reNH3tojI4k-88Rg=" alt="IndexLogo" width="105px" border-radius: 30px>
                </div>

        </div>

        <script src="main.js"></script>

    </div>

    </div>
</body>
</html>
